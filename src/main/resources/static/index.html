<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransferKolik | Player Finder</title>
    <style>
        :root {
            --primary-green: #2e7d32;
            --dark-green: #1b5e20;
            --light-green: #4caf50;
            --accent-gold: #ffb300;
            --bg-gradient: linear-gradient(135deg, #0d3012 0%, #1b431c 50%, #081c0a 100%);
        }

        /* 💡 TEMALAR — sadece CSS değişkenlerini değiştiriyoruz, aşağıdaki tüm
           stiller zaten bu değişkenleri kullandığı için otomatik olarak yeni
           renklere bürünüyor. Hiçbir HTML elementi ya da JS mantığı etkilenmiyor. */
        body.theme-sunset {
            --primary-green: #e85d2f;
            --dark-green: #7a2418;
            --light-green: #ff9457;
            --accent-gold: #ffd166;
            --bg-gradient: linear-gradient(135deg, #2b0f1a 0%, #6a1b2f 45%, #c1502e 100%);
        }

        body.theme-night {
            --primary-green: #3949ab;
            --dark-green: #131b4d;
            --light-green: #5c7cfa;
            --accent-gold: #64b5f6;
            --bg-gradient: linear-gradient(135deg, #02030f 0%, #0b1330 45%, #16213e 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
            transition: background 0.6s ease;
        }

        body::before {
            content: '';
            position: fixed;
            top: -20%;
            left: 50%;
            transform: translateX(-50%);
            width: 900px;
            height: 900px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(76, 175, 80, 0.18) 0%, transparent 65%);
            pointer-events: none;
            z-index: 0;
            transition: background 0.6s ease;
        }

        body.theme-sunset::before {
            background: radial-gradient(circle, rgba(255, 148, 87, 0.28) 0%, transparent 65%);
        }

        body.theme-night::before {
            background: radial-gradient(circle, rgba(92, 124, 250, 0.25) 0%, transparent 65%);
        }

        .container {
            width: 100%;
            max-width: 1150px;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 1;
            transition: box-shadow 0.6s ease;
        }

        body.theme-sunset .container {
            box-shadow: 0 15px 40px rgba(232, 93, 47, 0.35), 0 0 0 1px rgba(255, 209, 102, 0.12) inset;
        }

        body.theme-night .container {
            box-shadow: 0 15px 40px rgba(57, 73, 171, 0.45), 0 0 0 1px rgba(100, 181, 246, 0.15) inset;
        }

        .top-toolbar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .theme-switcher {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-right: auto;
        }

        .theme-label {
            font-size: 0.78rem;
            color: rgba(255, 255, 255, 0.55);
            font-weight: 600;
            letter-spacing: 0.3px;
            margin-right: 2px;
        }

        .theme-btn {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.25);
            cursor: pointer;
            padding: 0;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .theme-btn:hover {
            transform: scale(1.15);
        }

        .theme-btn.active {
            border-color: #ffffff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .theme-btn[data-theme="green"] {
            background: linear-gradient(135deg, #4caf50, #1b5e20);
        }

        .theme-btn[data-theme="sunset"] {
            background: linear-gradient(135deg, #ff9457, #7a2418);
        }

        .theme-btn[data-theme="night"] {
            background: linear-gradient(135deg, #5c7cfa, #131b4d);
        }

        .toolbar-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            border-radius: 20px;
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.06);
            color: #e0e0e0;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            white-space: nowrap;
        }

        .toolbar-btn:hover {
            background: rgba(255, 255, 255, 0.14);
        }

        .toolbar-btn.active {
            background: linear-gradient(135deg, var(--light-green), var(--dark-green));
            border-color: var(--accent-gold);
            box-shadow: 0 0 12px rgba(255, 179, 0, 0.35);
            color: #ffffff;
        }

        /* 💡 Ses butonu için ayrı stil: varsayılan (açık) hâli normal buton gibi
           görünsün, sadece kapatılınca soluk/gri bir "sessiz" görünümü alsın —
           diğer özelliklerin "aktif" altın parlamasıyla karışmasın. */
        .toolbar-btn.muted {
            opacity: 0.5;
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 255, 255, 0.12);
        }

        .year-filter-panel {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 8px;
            background: rgba(8, 26, 10, 0.98);
            border: 1.5px solid rgba(76, 175, 80, 0.5);
            border-radius: 12px;
            padding: 14px;
            gap: 8px;
            flex-direction: column;
            z-index: 60;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.55);
            min-width: 220px;
        }

        .year-filter-panel.open {
            display: flex;
        }

        .year-filter-panel input,
        .year-filter-panel select {
            padding: 8px 10px;
            border-radius: 8px;
            border: 1px solid rgba(76, 175, 80, 0.4);
            background: rgba(10, 30, 12, 0.7);
            color: #ffffff;
            font-size: 0.9rem;
        }

        /* 💡 Tarayıcının varsayılan artı/eksi ok butonlarını (number spinner) gizliyoruz
           — garip davranıyordu (tıklayınca değeri rastgele artırıyordu), kullanıcı
           sadece elle yazsın istiyoruz. */
        .year-filter-panel input[type="number"]::-webkit-inner-spin-button,
        .year-filter-panel input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .year-filter-panel input[type="number"] {
            -moz-appearance: textfield;
        }

        .year-filter-panel .yf-actions {
            display: flex;
            gap: 8px;
        }

        .year-filter-panel .yf-actions button {
            flex: 1;
            padding: 8px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
        }

        #yearFilterApplyBtn {
            background: linear-gradient(135deg, #66bb6a, #1b5e20);
            color: white;
        }

        #yearFilterClearBtn {
            background: rgba(255, 255, 255, 0.1);
            color: #e0e0e0;
        }

        .toolbar-wrapper {
            position: relative;
        }

        /* 💡 ÜST LOGO BARI — TransferKolik'in kendi özgün marka barı. Herhangi bir
           üçüncü taraf sitenin logosu/tasarımı kopyalanmadı; bu tamamen orijinal,
           genel bir "üstte yatay bar + logo" deseni (bu deseni hemen her site kullanır,
           kimseye ait değildir). Renkler mevcut tema sistemine bağlı, tema değişince
           logo barı da otomatik uyum sağlıyor.
        */
        .site-header {
            width: calc(100% + 40px);
            margin: -40px -20px 26px -20px;
            background: rgba(0, 0, 0, 0.38);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            position: sticky;
            top: 0;
            z-index: 300;
        }

        .site-header-inner {
            max-width: 1150px;
            margin: 0 auto;
            padding: 12px 20px;
            display: flex;
            align-items: center;
        }

        .logo-mark {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .logo-badge {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            background: radial-gradient(circle at 32% 28%, var(--light-green), var(--dark-green) 75%);
            border: 1.5px solid rgba(255, 255, 255, 0.28);
            box-shadow:
                    0 4px 16px rgba(0, 0, 0, 0.45),
                    0 0 10px var(--accent-gold),
                    inset 0 1px 3px rgba(255, 255, 255, 0.4),
                    inset 0 -3px 6px rgba(0, 0, 0, 0.3);
            transition: background 0.6s ease;
            animation: badgePulse 3s ease-in-out infinite;
        }

        @keyframes badgePulse {
            0%, 100% {
                box-shadow:
                        0 4px 16px rgba(0, 0, 0, 0.45),
                        0 0 10px var(--accent-gold),
                        inset 0 1px 3px rgba(255, 255, 255, 0.4),
                        inset 0 -3px 6px rgba(0, 0, 0, 0.3);
            }
            50% {
                box-shadow:
                        0 4px 20px rgba(0, 0, 0, 0.45),
                        0 0 20px var(--accent-gold),
                        inset 0 1px 3px rgba(255, 255, 255, 0.45),
                        inset 0 -3px 6px rgba(0, 0, 0, 0.3);
            }
        }

        .logo-text {
            font-size: 1.35rem;
            font-weight: 800;
            letter-spacing: 0.3px;
            color: #ffffff;
        }

        .logo-text-accent {
            color: #ffc233;
        }

        .dedication {
            text-align: center;
            font-size: 0.85rem;
            color: var(--light-green);
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #a5d6a7;
            font-size: 0.95rem;
            margin-bottom: 20px;
        }

        .top-loader {
            display: none;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(27, 94, 32, 0.8), rgba(10, 40, 15, 0.9));
            border: 1.5px solid var(--accent-gold);
            border-radius: 14px;
            padding: 10px 22px;
            margin: 0 auto 20px auto;
            max-width: 440px;
            gap: 15px;
            box-shadow: 0 0 20px rgba(255, 179, 0, 0.25), inset 0 1px 4px rgba(255, 255, 255, 0.2);
            animation: loaderGlow 2s infinite alternate;
        }

        @keyframes loaderGlow {
            0% { box-shadow: 0 0 10px rgba(255, 179, 0, 0.2), inset 0 1px 4px rgba(255, 255, 255, 0.2); }
            100% { box-shadow: 0 0 25px rgba(76, 175, 80, 0.5), inset 0 1px 6px rgba(255, 255, 255, 0.4); }
        }

        .loader-track {
            position: relative;
            width: 190px;
            height: 24px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .loader-track::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(76, 175, 80, 0.3), transparent);
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .rolling-ball {
            position: absolute;
            font-size: 20px;
            top: -1px;
            left: 0px;
            animation: rollAcrossModern 1.1s infinite cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        @keyframes rollAcrossModern {
            0% { left: -2px; transform: rotate(0deg) scale(0.9); }
            50% { transform: rotate(180deg) scale(1.1); }
            100% { left: 165px; transform: rotate(360deg) scale(0.9); }
        }

        .top-loader span {
            font-size: 0.9rem;
            background: linear-gradient(135deg, #ffffff, #a5d6a7, var(--accent-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
            letter-spacing: 0.8px;
            white-space: nowrap;
        }

        .search-card {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 15px;
            background: linear-gradient(135deg, rgba(27, 94, 32, 0.4), rgba(13, 48, 18, 0.6));
            padding: 22px;
            border-radius: 16px;
            border: 1px solid rgba(76, 175, 80, 0.5);
            box-shadow: inset 0 1px 3px rgba(255, 255, 255, 0.1), 0 10px 25px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
            overflow: visible;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .input-group label {
            font-size: 0.88rem;
            color: #a5d6a7;
            margin-bottom: 7px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .input-group input {
            padding: 14px 18px;
            border-radius: 10px;
            border: 1.5px solid rgba(76, 175, 80, 0.4);
            background: rgba(10, 30, 12, 0.7);
            color: #ffffff;
            font-size: 1.05rem;
            font-weight: 600;
            outline: none;
            transition: all 0.3s ease;
            width: 100%;
            -webkit-appearance: none;
            appearance: none;
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.4);
            font-weight: 400;
        }

        .input-group input:focus {
            border-color: var(--light-green);
            background: rgba(15, 45, 18, 0.95);
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.6);
            transform: translateY(-1px);
        }

        .autocomplete-dropdown {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            margin-top: 4px;
            background: rgba(8, 26, 10, 0.98);
            border: 1.5px solid rgba(76, 175, 80, 0.5);
            border-radius: 10px;
            max-height: 240px;
            overflow-y: auto;
            z-index: 100;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.55);
        }

        .autocomplete-item {
            padding: 12px 18px;
            color: #e0e0e0;
            cursor: pointer;
            font-size: 0.98rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .autocomplete-item:last-child {
            border-bottom: none;
        }

        .autocomplete-item:hover,
        .autocomplete-item.active {
            background: rgba(76, 175, 80, 0.25);
        }

        .btn-search {
            align-self: flex-end;
            padding: 14px 32px;
            background: linear-gradient(135deg, #66bb6a, #1b5e20);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.05rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(46, 125, 50, 0.5);
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        .btn-search:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(76, 175, 80, 0.8);
            background: linear-gradient(135deg, #81c784, var(--primary-green));
        }

        .btn-search:active {
            transform: translateY(-1px);
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(0, 0, 0, 0.3);
            text-align: left;
        }

        th {
            background: var(--dark-green);
            color: #e8f5e9;
            padding: 14px 18px;
            font-size: 0.95rem;
            text-transform: uppercase;
            border-bottom: 2px solid var(--light-green);
        }

        td {
            padding: 14px 18px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.95rem;
            color: #e0e0e0;
        }

        tbody tr:hover {
            background: rgba(76, 175, 80, 0.15);
        }

        .badge-id {
            background: rgba(255, 255, 255, 0.1);
            color: #90caf9;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-family: monospace;
            font-weight: bold;
        }

        .badge-country {
            background: rgba(255, 255, 255, 0.15);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
        }

        .badge-position {
            color: var(--accent-gold);
            font-weight: 500;
        }

        .badge-season {
            background: rgba(76, 175, 80, 0.2);
            color: #c8e6c9;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .hunter-name-row {
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .hunter-name {
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
        }

        .hunter-name.revealed {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            letter-spacing: normal;
        }

        .hunter-reveal-btn {
            margin-left: 8px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            cursor: pointer;
            padding: 2px 7px;
            font-size: 0.85rem;
        }

        .hunter-reveal-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .footer-signature {
            margin-top: 40px;
            text-align: right;
            width: 100%;
            max-width: 1150px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 1px;
        }

        .footer-signature span {
            color: var(--light-green);
            font-weight: bold;
        }

        /* 💡 Kısa bildirim (toast) — "Link kopyalandı" gibi geri bildirimler için */
        #appToast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(20, 20, 20, 0.95);
            color: #ffffff;
            padding: 12px 22px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease, transform 0.3s ease;
            z-index: 500;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        #appToast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 650px) {
            .search-card {
                grid-template-columns: 1fr;
            }
            .btn-search {
                width: 100%;
            }

            /* 💡 Mobilde eski "ortala + serbest sar" davranışı butonların gelişigüzel
               kümelenmesine yol açıyordu. Bunun yerine düzenli, 2 sütunlu bir grid
               kullanıyoruz — her buton kendi hücresinde, aynı boyutta, temiz sıralı. */
            .top-toolbar {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 8px;
                justify-content: stretch;
            }

            .theme-switcher {
                grid-column: 1 / -1;
                justify-content: center;
                margin-right: 0;
                gap: 10px;
                padding-bottom: 4px;
            }

            .toolbar-btn {
                width: 100%;
                justify-content: center;
                font-size: 0.78rem;
                padding: 9px 8px;
            }

            .toolbar-wrapper {
                width: 100%;
            }

            .toolbar-wrapper .toolbar-btn {
                width: 100%;
            }

            /* Paylaş, en az kullanılan ve tek kalan buton olduğu için kendi
               satırında tam genişlik ve ortalanmış duruyor */
            #shareBtn {
                grid-column: 1 / -1;
            }

            .year-filter-panel {
                left: 0;
                right: 0;
            }

            /* 💡 Mobilde dokunma hedefi küçük kalmasın diye tema noktalarını büyütüyoruz */
            .theme-btn {
                width: 38px;
                height: 38px;
            }

            .logo-text {
                font-size: 1.15rem;
            }

            .logo-badge {
                width: 32px;
                height: 32px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

<header class="site-header">
    <div class="site-header-inner">
        <a href="/" class="logo-mark" title="TransferKolik Ana Sayfa">
            <span class="logo-badge">⚽</span>
            <span class="logo-text">Transfer<span class="logo-text-accent">Kolik</span></span>
        </a>
    </div>
</header>

<div class="container">

    <div class="top-toolbar">
        <div class="theme-switcher">
            <span class="theme-label">Tema:</span>
            <button class="theme-btn active" data-theme="green" title="Yeşil (Varsayılan)"></button>
            <button class="theme-btn" data-theme="sunset" title="Gün Batımı"></button>
            <button class="theme-btn" data-theme="night" title="Gece Mavisi"></button>
        </div>

        <button id="luckyModeBtn" class="toolbar-btn" title="Rastgele iki takım/ülke seçer, aramayı siz başlatırsınız — tahmin oyunu için ideal">
            🎲 Şans Modu
        </button>

        <button id="hunterModeBtn" class="toolbar-btn" title="Oyuncu isimlerini gizleyip eğlenceli bir tahmin oyununa çevirir">
            🕵️ Hunter Mode
        </button>

        <div class="toolbar-wrapper">
            <button id="yearFilterBtn" class="toolbar-btn" title="Sonuçları belirli bir yıldan önce/sonra olacak şekilde filtrele">
                📅 Yıl Filtresi
            </button>
            <div id="yearFilterPanel" class="year-filter-panel">
                <input type="number" id="yearFilterInput" placeholder="Örn: 2015" value="2015">
                <select id="yearFilterModeSelect">

    // 💡 BİLDİRİM (TOAST)
    function showToast(message) {
        let toast = document.getElementById('appToast');
        if (!toast) {
            toast = document.createElement('div');
            toast.id = 'appToast';
            document.body.appendChild(toast);
        }
        toast.textContent = message;
        toast.classList.add('show');
        clearTimeout(toast._hideTimer);
        toast._hideTimer = setTimeout(() => toast.classList.remove('show'), 2200);

    // 💡 SES EFEKTİ — harici ses dosyasına gerek yok, Web Audio API ile anlık üretiliyor.
    // Sadece kullanıcının kendi tıklamasıyla tetiklendiği için tarayıcıların otomatik
    // ses engelleme politikalarına takılmıyor.
    function playSearchSound() {
        if (!soundOn) return;
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const now = ctx.currentTime;

            // 🎵 Hakem düdüğü hissi: iki hafif detune edilmiş kare dalga birlikte
            // çalınca klasik "titreşen düdük" tonu oluşuyor.
            const osc1 = ctx.createOscillator();
            const osc2 = ctx.createOscillator();
            const whistleGain = ctx.createGain();

            osc1.type = 'square';
            osc2.type = 'square';
            osc1.frequency.setValueAtTime(1200, now);
            osc2.frequency.setValueAtTime(1215, now);

            whistleGain.gain.setValueAtTime(0, now);
            whistleGain.gain.linearRampToValueAtTime(0.10, now + 0.02);
            whistleGain.gain.exponentialRampToValueAtTime(0.001, now + 0.26);

            osc1.connect(whistleGain);
            osc2.connect(whistleGain);
            whistleGain.connect(ctx.destination);

            osc1.start(now);
            osc2.start(now);
            osc1.stop(now + 0.28);
            osc2.stop(now + 0.28);

            // ⚽ Düdüğün hemen ardından kısa, alçalan bir "top vuruşu" pop sesi
            const popOsc = ctx.createOscillator();
            const popGain = ctx.createGain();

            popOsc.type = 'sine';
            popOsc.frequency.setValueAtTime(180, now + 0.24);
            popOsc.frequency.exponentialRampToValueAtTime(55, now + 0.36);

            popGain.gain.setValueAtTime(0.22, now + 0.24);
            popGain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);

            popOsc.connect(popGain);
            popGain.connect(ctx.destination);

            popOsc.start(now + 0.24);
            popOsc.stop(now + 0.4);
        } catch (e) {
            console.log("Ses çalınamadı:", e);
        }
    }

    function setupAutocomplete(inputId, dropdownId) {
        const input = document.getElementById(inputId);
        const dropdown = document.getElementById(dropdownId);
        let activeIndex = -1;

        function closeDropdown() {
            dropdown.style.display = "none";
            dropdown.innerHTML = "";
            activeIndex = -1;
        }

        function renderMatches() {
            const query = input.value.trim();
            if (!query) {
                closeDropdown();
                return;
            }

            const normalizedQuery = normalize(query);
            const matches = allSuggestions
                .filter(s => normalize(s).includes(normalizedQuery))
                .slice(0, 8);

            dropdown.innerHTML = "";
            activeIndex = -1;

            if (matches.length === 0) {
                closeDropdown();
                return;
            }

            matches.forEach(match => {
                const item = document.createElement("div");
                item.className = "autocomplete-item";
                item.textContent = match;

                item.addEventListener("mousedown", (e) => {
                    e.preventDefault();
                    input.value = match;
                    closeDropdown();
                });

                dropdown.appendChild(item);
            });

            dropdown.style.display = "block";
        }

        input.addEventListener("input", renderMatches);
        input.addEventListener("focus", renderMatches);

        input.addEventListener("blur", () => {
            setTimeout(closeDropdown, 150);
        });

        input.addEventListener("keydown", (e) => {
            const items = dropdown.querySelectorAll(".autocomplete-item");
            if (items.length === 0) return;

            if (e.key === "ArrowDown") {
                e.preventDefault();
                activeIndex = Math.min(activeIndex + 1, items.length - 1);
            } else if (e.key === "ArrowUp") {
                e.preventDefault();
                activeIndex = Math.max(activeIndex - 1, 0);
            } else if (e.key === "Enter") {
                if (activeIndex >= 0 && items[activeIndex]) {
                    e.preventDefault();
                    input.value = items[activeIndex].textContent;
                    closeDropdown();
                }
                return;
            } else if (e.key === "Escape") {
                closeDropdown();
                return;
            } else {
                return;
            }

            items.forEach((item, idx) => {
                item.classList.toggle("active", idx === activeIndex);
            });
            items[activeIndex].scrollIntoView({ block: "nearest" });
        });
    }

    function setupThemeSwitcher() {

                document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));

    function maskName(name) {
        return name.split(' ').map(word => {
            const letters = word.split('');
            const len = letters.length;

            // Kısa kelimelerde (3 harf ve altı) sadece ortadaki tek harfi maskeliyoruz,
            // aksi halde tamamen okunmaz hale geliyor.
            if (len <= 3) {
                const midIdx = Math.floor(len / 2);
                return letters.map((ch, idx) => {
                    if (idx === midIdx && /[a-zA-ZçÇğĞıİöÖşŞüÜ]/.test(ch)) {
                        return '★';
                    }
                    return ch;
                }).join('');
            }

            // Uzun kelimelerde ilk ve son harf her zaman açık kalıyor, aradaki
            // harflerin sadece %35'i (öncekinden çok daha az) maskeleniyor.
            return letters.map((ch, idx) => {
                if (idx === 0 || idx === len - 1) return ch;
                if (/[a-zA-ZçÇğĞıİöÖşŞüÜ]/.test(ch) && Math.random() < 0.35) {
                    return '★';
                }
                return ch;
            }).join('');
        }).join(' ');
    }

        const btn = document.getElementById('hunterModeBtn');

    function seasonToYear(season) {
        if (!season || season === '-') return null;
        const digits = season.replace(/\D/g, '');
        if (digits.length >= 2) {
            const yearPrefix = parseInt(digits.substring(0, 2), 10);
            if (isNaN(yearPrefix)) return null;
            return yearPrefix >= 50 ? 1900 + yearPrefix : 2000 + yearPrefix;
        }
        return null;
    }

    function passesYearFilter(player) {
        if (!yearFilterActive || yearFilterValue === null) return true;

        const y1 = seasonToYear(player.season1);
        const y2 = seasonToYear(player.season2);
        const candidates = [y1, y2].filter(y => y !== null);

        if (candidates.length === 0) return false;

        // 💡 AND mantığı: kulüp-kulüp aramasında GEÇERLİ olan (yani "-" olmayan)
        // her iki sezonun da koşulu sağlaması gerekiyor. Ülke tarafı zaten "-" olduğu
        // için (null olarak candidates'ten çıkarılıyor), kulüp-ülke aramasında
        // otomatik olarak sadece kulüp tarafı kontrol edilmiş oluyor.
        if (yearFilterMode === 'before') {
            return candidates.every(y => y <= yearFilterValue);
        } else {
            return candidates.every(y => y >= yearFilterValue);
        }
    }

    function setupYearFilter() {
        const filterBtn = document.getElementById('yearFilterBtn');
        const panel = document.getElementById('yearFilterPanel');
        const input = document.getElementById('yearFilterInput');
        const modeSelect = document.getElementById('yearFilterModeSelect');

        filterBtn.addEventListener('click', () => {
            panel.classList.toggle('open');
        });

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('yearFilterApplyBtn').click();
            }
        });

        document.getElementById('yearFilterApplyBtn').addEventListener('click', () => {
            const val = parseInt(input.value, 10);
            if (!isNaN(val)) {
                yearFilterActive = true;
                yearFilterValue = val;
                yearFilterMode = modeSelect.value;
                filterBtn.classList.add('active');
                renderPlayersTable(currentPlayers);
            }
        });

        document.getElementById('yearFilterClearBtn').addEventListener('click', () => {
            yearFilterActive = false;
            yearFilterValue = null;
            input.value = '';
            filterBtn.classList.remove('active');
            renderPlayersTable(currentPlayers);
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.toolbar-wrapper')) {
                panel.classList.remove('open');
            }
        });
    }

    function renderPlayersTable(players) {
        const resultsTable = document.getElementById("resultsTable");
        resultsTable.innerHTML = "";

        const filtered = (players || []).filter(passesYearFilter);

        if (!filtered || filtered.length === 0) {
            resultsTable.innerHTML = "<tr><td colspan='7' style='text-align:center; padding:20px;'>Kriterlere uygun oyuncu bulunamadı.</td></tr>";
            return;
        }

        filtered.forEach(player => {
            const row = resultsTable.insertRow();

            const idCell = row.insertCell();
            idCell.innerHTML = `<span class="badge-id">${player.playerId || "-"}</span>`;

            let cleanName = (player.name || "-").replace(/\s*\(\d+\)\s*/g, "").trim();
            const nameCell = row.insertCell();
            nameCell.style.fontWeight = "600";

            if (hunterModeOn) {
                const masked = maskName(cleanName);
                const safeReal = cleanName.replace(/"/g, "&quot;");
                const safeMasked = masked.replace(/"/g, "&quot;");
                nameCell.innerHTML = `<div class="hunter-name-row"><span class="hunter-name" data-real="${safeReal}" data-masked="${safeMasked}">${masked}</span><button class="hunter-reveal-btn" title="Göster/Gizle">👁</button></div>`;
            } else {
                nameCell.textContent = cleanName;
            }

            const posCell = row.insertCell();
            posCell.textContent = player.position || "-";
            posCell.className = "badge-position";

            const natCell = row.insertCell();
            let rawNationality = (player.nationality || "-").trim();
            let firstNationality = rawNationality.split(/[\s,–-]+/)[0];
            const flag = getFlagEmoji(firstNationality);
            natCell.innerHTML = `<span class="badge-country">${flag ? flag + ' ' : ''}${firstNationality}</span>`;

            const dobCell = row.insertCell();
            dobCell.textContent = player.birthDate || "-";

            const s1Cell = row.insertCell();
            s1Cell.innerHTML = `<span class="badge-season">${player.season1 || "-"}</span>`;

            const s2Cell = row.insertCell();
            s2Cell.innerHTML = `<span class="badge-season">${player.season2 || "-"}</span>`;
        });

        if (hunterModeOn) {
            resultsTable.querySelectorAll('.hunter-reveal-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const span = btn.previousElementSibling;
                    const revealed = span.classList.toggle('revealed');
                    span.textContent = revealed ? span.dataset.real : span.dataset.masked;
                    btn.textContent = revealed ? '🙈' : '👁';
                });
            });
        }
    }

    async function searchPlayers() {
        const input1 = document.getElementById("club1Input").value.trim();
        const input2 = document.getElementById("club2Input").value.trim();
        const resultsTable = document.getElementById("resultsTable");
        const topLoader = document.getElementById("topLoader");

        if (!input1 && !input2) {
            resultsTable.innerHTML = "<tr><td colspan='7' style='text-align:center; padding:20px;'>Lütfen en az bir alan doldurunuz.</td></tr>";
            return;
        }

        topLoader.style.display = "flex";
        playSearchSound();

        try {
            let url = input1 && input2
                ? `/commonPlayers?club1=${encodeURIComponent(input1)}&club2=${encodeURIComponent(input2)}`
                : `/players?club=${encodeURIComponent(input1 || input2)}`;

            const response = await fetch(url);
            const players = await response.json();

            currentPlayers = players || [];
            renderPlayersTable(currentPlayers);

        } catch (error) {
            resultsTable.innerHTML = `<tr><td colspan='7' style='text-align:center; color:#ff8a80; padding:20px;'>Hata: ${error.message}</td></tr>`;
        } finally {
            topLoader.style.display = "none";
        }
    }
