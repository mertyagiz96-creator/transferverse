<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransferVerse | Player Finder</title>
    <style>
        :root {
            --primary-green: #2e7d32;
            --dark-green: #1b5e20;
            --light-green: #4caf50;
            --accent-gold: #ffb300;
            --bg-gradient: linear-gradient(135deg, #0d3012 0%, #1b431c 50%, #081c0a 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            position: relative;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        h1 {
            text-align: center;
            color: #ffffff;
            font-size: 2.2rem;
            margin-bottom: 4px;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .dedication {
            text-align: center;
            font-size: 0.85rem;
            color: var(--light-green);
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .subtitle {
            text-align: center;
            color: #a5d6a7;
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        .search-card {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 15px;
            background: rgba(0, 0, 0, 0.25);
            padding: 20px;
            border-radius: 14px;
            border: 1px solid rgba(76, 175, 80, 0.3);
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-size: 0.85rem;
            color: #c8e6c9;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .input-group input {
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.9);
            color: #1b431c;
            font-size: 1rem;
            font-weight: 600;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: var(--light-green);
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
            background: #ffffff;
        }

        .btn-search {
            align-self: flex-end;
            padding: 12px 28px;
            background: linear-gradient(135deg, var(--light-green), var(--dark-green));
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(46, 125, 50, 0.4);
            transition: all 0.3s ease;
        }

        .btn-search:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.6);
            background: linear-gradient(135deg, #66bb6a, var(--primary-green));
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(0, 0, 0, 0.3);
            text-align: left;
        }

        th {
            background: var(--dark-green);
            color: #e8f5e9;
            padding: 14px 18px;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid var(--light-green);
        }

        td {
            padding: 14px 18px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.95rem;
            color: #e0e0e0;
        }

        tbody tr {
            transition: background 0.2s ease;
        }

        tbody tr:hover {
            background: rgba(76, 175, 80, 0.15);
        }

        .badge-country {
            background: rgba(255, 255, 255, 0.15);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            display: inline-block;
        }

        .badge-position {
            color: var(--accent-gold);
            font-weight: 500;
        }

        .footer-signature {
            margin-top: 40px;
            text-align: right;
            width: 100%;
            max-width: 900px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 1px;
        }

        .footer-signature span {
            color: var(--light-green);
            font-weight: bold;
        }

        @media (max-width: 650px) {
            .search-card {
                grid-template-columns: 1fr;
            }
            .btn-search {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>⚽ TransferVerse</h1>
    <div class="dedication">Harman'a Sevgiler ❤️</div>
    <p class="subtitle">İki Kulüp Arasındaki Ortak Oyuncular veya Kulüp - Ülke Araması</p>

    <div class="search-card">
        <div class="input-group">
            <label for="club1Input">1. Kulüp veya Ülke</label>
            <input id="club1Input" type="text" placeholder="Örn: Galatasaray" value="Galatasaray">
        </div>

        <div class="input-group">
            <label for="club2Input">2. Kulüp veya Ülke</label>
            <input id="club2Input" type="text" placeholder="Örn: Antalyaspor" value="Antalyaspor">
        </div>

        <button id="searchBtn" class="btn-search">Ara</button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
            <tr>
                <th>Oyuncu Adı</th>
                <th>Mevki</th>
                <th>Uyruk</th>
            </tr>
            </thead>
            <tbody id="resultsTable"></tbody>
        </table>
    </div>
</div>

<div class="footer-signature">
    Developed with ❤️ by <span>mertoreuss</span>
</div>

<script>
    // Türkçe ülke isimlerini İngilizceye çeviren genişletilmiş sözlük
    const countryMap = {
        // Avrupa
        "almanya": "Germany", "fransa": "France", "ingiltere": "England",
        "ispanya": "Spain", "italya": "Italy", "hollanda": "Netherlands",
        "portekiz": "Portugal", "turkiye": "Turkey", "türkiye": "Turkey",
        "belçika": "Belgium", "belcika": "Belgium", "hırvatistan": "Croatia",
        "hirvatistan": "Croatia", "isveç": "Sweden", "isvec": "Sweden",
        "isviçre": "Switzerland", "isvicre": "Switzerland", "danimarka": "Denmark",
        "norveç": "Norway", "norvec": "Norway", "yunanistan": "Greece",
        "sırbistan": "Serbia", "sirbistan": "Serbia", "bosna hersek": "Bosnia-Herzegovina",
        "bosna": "Bosnia-Herzegovina", "polonya": "Poland", "rusya": "Russia",
        "ukrayna": "Ukraine", "romanya": "Romania", "avusturya": "Austria",
        "çekya": "Czech Republic", "cekyas": "Czech Republic",

        // Amerika
        "kanada": "Canada", "amerika": "United States", "abd": "United States",
        "brezilya": "Brazil", "arjantin": "Argentina", "kolombiya": "Colombia",
        "uruguay": "Uruguay", "şili": "Chile", "sili": "Chile", "meksika": "Mexico",
        "paraguay": "Paraguay", "peru": "Peru", "ekvador": "Ecuador",

        // Afrika
        "fildişi sahili": "Cote d'Ivoire", "fildisi sahili": "Cote d'Ivoire", "fildişi": "Cote d'Ivoire",
        "nijerya": "Nigeria", "kamerun": "Cameroon", "senegal": "Senegal",
        "fas": "Morocco", "cezayir": "Algeria", "mısır": "Egypt", "misir": "Egypt",
        "gana": "Ghana", "gane": "Ghana", "güney afrika": "South Africa",
        "kongo": "Congo", "demokratik kongo": "DR Congo",

        // Asya & Okyanusya
        "japonya": "Japan", "güney kore": "Korea, South", "guney kore": "Korea, South",
        "çin": "China", "cin": "China", "iran": "Iran", "avustralya": "Australia",
        "suudi arabistan": "Saudi Arabia", "katar": "Qatar", "özbekistan": "Uzbekistan"
    };

    function formatQueryParam(text) {
        if (!text) return "";
        const lowerText = text.trim().toLocaleLowerCase('tr');
        return countryMap[lowerText] || text.trim();
    }

    async function searchPlayers() {
        const rawInput1 = document.getElementById("club1Input").value;
        const rawInput2 = document.getElementById("club2Input").value;

        const input1 = formatQueryParam(rawInput1);
        const input2 = formatQueryParam(rawInput2);

        const resultsTable = document.getElementById("resultsTable");
        resultsTable.innerHTML = "<tr><td colspan='3' style='text-align:center; padding:20px;'>Aranıyor...</td></tr>";

        if (!input1 && !input2) {
            resultsTable.innerHTML = "<tr><td colspan='3' style='text-align:center; padding:20px;'>Lütfen en az bir kulüp veya ülke giriniz.</td></tr>";
            return;
        }

        try {
            let url = "";
            if (input1 && input2) {
                url = `/commonPlayers?club1=${encodeURIComponent(input1)}&club2=${encodeURIComponent(input2)}`;
            } else {
                const param = input1 || input2;
                url = `/players?club=${encodeURIComponent(param)}`;
            }

            const response = await fetch(url);
            const players = await response.json();

            resultsTable.innerHTML = "";

            if (!players || players.length === 0) {
                resultsTable.innerHTML = "<tr><td colspan='3' style='text-align:center; padding:20px;'>Aranan kriterlere uygun oyuncu bulunamadı.</td></tr>";
                return;
            }

            players.forEach(player => {
                const row = resultsTable.insertRow();

                const nameCell = row.insertCell();
                nameCell.textContent = player.name || "-";
                nameCell.style.fontWeight = "600";

                const posCell = row.insertCell();
                posCell.textContent = player.position || "-";
                posCell.className = "badge-position";

                const natCell = row.insertCell();
                natCell.innerHTML = `<span class="badge-country">${player.nationality || "-"}</span>`;
            });

        } catch (error) {
            console.error("Hata:", error);
            resultsTable.innerHTML = `<tr><td colspan='3' style='text-align:center; color:#ff8a80; padding:20px;'>Hata oluştu: ${error.message}</td></tr>`;
        }
    }

    document.getElementById("searchBtn").addEventListener("click", searchPlayers);
    window.onload = () => { searchPlayers(); };
</script>
</body>
</html>
